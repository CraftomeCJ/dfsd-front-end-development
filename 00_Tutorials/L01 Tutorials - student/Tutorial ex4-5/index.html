<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <div id="card" class="">
    <img class="" src="images/john.jpg" alt="" />
    <p id="name" class="">John Doe</p>
    <p id="request" class="">Sent you a connection request</p>
    <div class="">
      <button id="accept" class="">
        Accept
      </button>
      <button id="decline" class="">Decline</button>
    </div>
  </div>
</body>

</html>
