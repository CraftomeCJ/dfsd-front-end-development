<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <div id="card" class="bg-indigo-500 w-75 rounded-lg">
    <img class="size-20 object-cover rounded-full border border-white" src="images/john.jpg" alt="" />

    <p id="name" class="font-medium text-white">John Doe</p>

    <p id="request" class="text-sm text-indigo-200">Sent you a connection request</p>

    <div class="">
      <button id="accept" class="bg-white text-indigo-600 border border-indigo-500 font-medium text-sm rounded-md">
        Accept
      </button>

      <button id="decline" class="text-white border border-indigo-300 text-sm rounded-md">
        Decline
      </button>
    </div>
  </div>
</body>

</html>
